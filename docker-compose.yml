services:

  web:
    build: .
    container_name: ci4_web
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8
    container_name: ci4_db
    restart: always
    environment:
      MYSQL_DATABASE: ci4
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: ci4
      MYSQL_PASSWORD: ci4
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: ci4_phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    depends_on:
      - db

volumes:
  dbdata: